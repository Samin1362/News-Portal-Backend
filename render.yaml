# Render Blueprint for the News Portal backend.
#
# Layout assumption:
#   The contents of this `backend/` folder are pushed to GitHub as the
#   repository ROOT (the `package.json` lives at the repo root, not under a
#   `backend/` subfolder). This file therefore lives at the repo root once
#   pushed, and no `rootDir` directive is needed.
#
# Notes:
#   - sync: false on every secret-bearing env var so the values must be
#     filled in via the Render dashboard (never committed to git).
#   - Free-plan instances sleep after 15 min of inactivity. Scheduled
#     publishing (node-cron) pauses during sleep — see README.md for
#     production trade-offs.
services:
  - type: web
    name: news-portal-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: URI
        sync: false
      - key: DB_NAME
        value: news_portal
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: RATE_LIMIT_GLOBAL_PER_MIN
        value: 300
      - key: COMMENTS_REQUIRE_APPROVAL
        value: "false"
